name: Extract and Push ZIP

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  unzip_and_push:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      - run: mkdir -p ChomensSource

      - run: unzip -o ChomensSource.zip -d ChomensSource

      - run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

          git add ChomensSource

          git commit -m "Add extracted files from ChomensSource.zip" || echo "No changes to commit"

          git push
